<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Site - Tailwind</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-white font-sans text-black min-h-screen flex flex-col">

  <nav class="flex flex-wrap items-center justify-between px-6 md:px-10 h-auto py-4 bg-white border-b-2 border-gray-200 gap-4">
    <div class="text-2xl font-black tracking-tighter">
        My<span class="text-gray-400 font-light">movie</span>
    </div>

    <div class="flex flex-wrap gap-4 md:gap-8 text-sm font-medium">
      <a href="agasbnytailwin.html" class="text-gray-900 border-b-2 border-gray-900 pb-1 hover:text-gray-700">Home</a>
      <a href="series.html" class="text-gray-600 hover:text-gray-900">Series</a>
      <a href="categories.html" class="text-gray-600 hover:text-gray-900">Categories</a>
    </div>

    <div class="flex items-center gap-3 md:gap-4 w-full md:w-auto justify-between md:justify-end">
      <div class="flex border border-gray-400 rounded overflow-hidden flex-1 max-w-xs">
        <input type="text" placeholder="Search movies..." class="px-3 py-2 outline-none w-full text-sm">
        <button class="bg-gray-400 px-3 text-black border-l border-black hover:bg-gray-500 text-sm">Go</button>
      </div>
      <a href="index.html" class="bg-black text-white px-4 md:px-5 py-2 rounded font-bold hover:bg-gray-800 transition text-sm md:text-base text-center">Logout</a>
    </div>
  </nav>

  <main class="max-w-[1200px] mx-auto my-10 px-5 flex-1">
    
    <div class="flex justify-between items-center mb-5 border-b border-gray-400 pb-2">
        <h2 class="text-lg font-bold uppercase text-gray-800">New Releases</h2>
        <div class="font-bold cursor-pointer hover:underline">View All</div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
      
      <div class="bg-white border border-gray-400 rounded overflow-hidden flex flex-col shadow-sm">
        <img src="images/sisu.jpg" alt="Sisu" class="w-full h-80 object-cover">
        <div class="p-4 text-center border-t border-gray-400 font-bold">Sisu</div>
      </div>

      <div class="bg-white border border-gray-200 rounded overflow-hidden flex flex-col shadow-sm">
        <img src="images/beauty.jpg" alt="Beauty in black" class="w-full h-80 object-cover">
        <div class="p-4 text-center border-t border-gray-200 font-bold">Beauty in black</div>
      </div>

      <div class="bg-white border border-sky-200 rounded overflow-hidden flex flex-col shadow-sm">
        <img src="images/bunker.jpg" alt="Billionaires Bunker" class="w-full h-80 object-cover">
        <div class="p-4 text-center border-t border-gray-100 font-bold">Billionaires Bunker</div>
      </div>

      <div class="bg-white border border-gray-200 rounded overflow-hidden flex flex-col shadow-sm">
        <img src="images/lacasa.jpg" alt="Lacasa de papel" class="w-full h-80 object-cover">
        <div class="p-4 text-center border-t border-sky-200 font-bold">Lacasa de papel</div>
      </div>

    </div>
  </main>

  <footer class="bg-gray-900 text-gray-100 py-14 px-10 mt-14">
    <div class="max-w-[1200px] mx-auto flex flex-wrap justify-between gap-10">
      
      <div>
        <h4 class="font-bold mb-4 text-white">Navigation</h4>
        <div class="text-sm leading-8 text-gray-300">
            Home<br>Series<br>Movies
        </div>
      </div>

      <div>
        <h4 class="font-bold mb-4 text-white">Legal</h4>
        <div class="text-sm leading-8 text-gray-300">
            Privacy Policy<br>Terms of Service<br>Cookies
        </div>
      </div>

      <div>
        <h4 class="font-bold mb-4 text-white">Contact</h4>
        <div class="text-sm leading-8 text-gray-300">
            Help Center<br>Support Team<br>Contact Us
        </div>
      </div>

    </div>
    <div class="text-center mt-10 border-t border-gray-700 pt-5 text-xs text-gray-400">
        &copy; 2024 MovieHub Project. All rights reserved.
    </div>
  </footer>

</body>
</html>
