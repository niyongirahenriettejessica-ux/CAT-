<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMovie - TV Series</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-white font-sans text-black min-h-screen flex flex-col">

  <nav class="flex flex-wrap items-center justify-between px-6 md:px-10 h-auto py-4 bg-white border-b-2 border-gray-200 gap-4">
    <div class="text-2xl font-black tracking-tighter">
        My<span class="text-gray-400 font-light">movie</span>
    </div>

    <div class="flex flex-wrap gap-4 md:gap-8 text-sm font-medium">
      <a href="agasbnytailwin.html" class="text-gray-600 hover:text-gray-900">Home</a>
      <a href="series.html" class="text-gray-900 border-b-2 border-gray-900 pb-1">Series</a>
      <a href="categories.html" class="text-gray-600 hover:text-gray-900">Categories</a>
    </div>

    <div class="flex items-center gap-3 md:gap-4 w-full md:w-auto justify-between md:justify-end">
      <div class="flex border border-gray-400 rounded overflow-hidden flex-1 max-w-xs">
        <input type="text" placeholder="Search series..." class="px-3 py-2 outline-none w-full text-sm">
        <button class="bg-gray-400 px-3 text-black border-l border-black hover:bg-gray-500 text-sm">Go</button>
      </div>
      <a href="index.html" class="bg-black text-white px-4 md:px-5 py-2 rounded font-bold hover:bg-gray-800 transition text-sm md:text-base text-center">Logout</a>
    </div>
  </nav>

  <main class="max-w-[1200px] mx-auto my-10 px-5 flex-1">
    
    <div class="flex justify-between items-center mb-5 border-b border-gray-300 pb-2">
        <h2 class="text-lg font-bold uppercase text-gray-800">TV Series</h2>
        <div class="font-bold cursor-pointer hover:underline text-sm">Featured</div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
      
      <div class="bg-white rounded-lg overflow-hidden shadow-md transform transition-transform duration-300 hover:scale-105 cursor-pointer">
        <img src="images/iland.jpg" alt="I Land" class="w-full h-80 object-cover bg-gray-200">
        <div class="p-4 text-center">
          <div class="font-bold text-gray-900">I Land</div>
          <div class="text-xs text-red-600 mt-1 uppercase tracking-wide">5 Seasons</div>
        </div>
      </div>

      <div class="bg-white rounded-lg overflow-hidden shadow-md transform transition-transform duration-300 hover:scale-105 cursor-pointer">
        <img src="images/375.jpg" alt="375" class="w-full h-80 object-cover bg-gray-200">
        <div class="p-4 text-center">
          <div class="font-bold text-gray-900">375</div>
          <div class="text-xs text-red-600 mt-1 uppercase tracking-wide">5 Seasons</div>
        </div>
      </div>

      <div class="bg-white rounded-lg overflow-hidden shadow-md transform transition-transform duration-300 hover:scale-105 cursor-pointer">
        <img src="images/squid.jpg" alt="Squid Game" class="w-full h-80 object-cover bg-gray-200">
        <div class="p-4 text-center">
          <div class="font-bold text-gray-900">Squid Game</div>
          <div class="text-xs text-red-600 mt-1 uppercase tracking-wide">1 Season</div>
        </div>
      </div>

      <div class="bg-white rounded-lg overflow-hidden shadow-md transform transition-transform duration-300 hover:scale-105 cursor-pointer">
        <img src="images/hate story.jpg" alt="Hate Story" class="w-full h-80 object-cover bg-gray-200">
        <div class="p-4 text-center">
          <div class="font-bold text-gray-900">Hate Story</div>
          <div class="text-xs text-red-600 mt-1 uppercase tracking-wide">New Episodes</div>
        </div>
      </div>

    </div>
  </main>

  <footer class="bg-gray-900 text-gray-100 py-10 px-6 mt-14 text-center">
    <p class="text-sm">&copy; 2024 MyMovie Project. All rights reserved.</p>
    <a href="agasbnytailwin.html" class="text-xs text-indigo-300 underline mt-2 inline-block">Back to Home</a>
  </footer>

</body>
</html>
